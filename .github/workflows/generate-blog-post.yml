name: Generate blog post

on:
  push:
    branches:
      - "blog/request-*"
    paths:
      - ".github/blog-post-request.json"
  workflow_dispatch:
    inputs:
      keyword:
        description: "SEO keyword or topic"
        required: true
        type: string
      category:
        description: "Category override"
        required: true
        default: "auto"
        type: choice
        options:
          - auto
          - k-culture
          - k-food
          - living
          - travel
          - uncategorized
      status:
        description: "Post status"
        required: true
        default: "published"
        type: choice
        options:
          - published
          - draft
      no_images:
        description: "Skip Unsplash image search"
        required: true
        default: false
        type: boolean
      force:
        description: "Overwrite an existing post with the same slug"
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    name: Generate post and open PR
    runs-on: ubuntu-latest

    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL || 'claude-sonnet-4-6' }}
      UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve generation request
        id: request
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            {
              echo "keyword=${{ inputs.keyword }}"
              echo "category=${{ inputs.category }}"
              echo "status=${{ inputs.status }}"
              echo "no_images=${{ inputs.no_images }}"
              echo "force=${{ inputs.force }}"
            } >> "$GITHUB_OUTPUT"
          else
            node -e 'const fs = require("node:fs"); const request = JSON.parse(fs.readFileSync(".github/blog-post-request.json", "utf8")); const output = { keyword: request.keyword, category: request.category || "auto", status: request.status || "published", no_images: String(Boolean(request.noImages)), force: String(Boolean(request.force)) }; for (const [key, value] of Object.entries(output)) console.log(`${key}=${String(value).replace(/\n/g, " ")}`);' >> "$GITHUB_OUTPUT"
          fi

      - name: Generate blog post
        shell: bash
        run: |
          args=("${{ steps.request.outputs.keyword }}" "--status" "${{ steps.request.outputs.status }}")

          if [[ "${{ steps.request.outputs.category }}" != "auto" ]]; then
            args+=("--category" "${{ steps.request.outputs.category }}")
          fi

          if [[ "${{ steps.request.outputs.no_images }}" == "true" ]]; then
            args+=("--no-images")
          fi

          if [[ "${{ steps.request.outputs.force }}" == "true" ]]; then
            args+=("--force")
          fi

          node scripts/generate-post.mjs "${args[@]}"

      - name: Remove request file
        if: github.event_name == 'push'
        run: rm -f .github/blog-post-request.json

      - name: Sync generated posts
        run: npm run sync:posts

      - name: Validate generated site
        run: |
          npm run lint
          npm run build

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: blog/auto-${{ github.run_id }}
          delete-branch: true
          commit-message: "Add generated blog post for ${{ steps.request.outputs.keyword }}"
          title: "Add blog post: ${{ steps.request.outputs.keyword }}"
          body: |
            ## Summary
            - Generated a new blog post from keyword: `${{ steps.request.outputs.keyword }}`
            - Category input: `${{ steps.request.outputs.category }}`
            - Status: `${{ steps.request.outputs.status }}`
            - Unsplash images skipped: `${{ steps.request.outputs.no_images }}`

            ## Validation
            - `npm run sync:posts`
            - `npm run lint`
            - `npm run build`
